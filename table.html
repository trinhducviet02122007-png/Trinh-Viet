<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table>
        <thead>
            <th> mã sinh viên</th>
            <th> Họ và tên </th>
            <th> Năm sinh </th>
            <th>Địa chỉ</th>
        </thead>
        <tbody>
            <tr>
                <td>001</td>
                <td>Trịnh Việt</td>
                <td> 2007</td>
                <td> nha m</td>
            </tr>
        </tbody>
    </table>
    <table style="border: 1px solid black; border-radius: 1000px; border-style:dotted;">
        <tr>
            <td>Ô dữ liệu tổ 1</td>
            <td>Ô dữ liệu tổ 2</td>
        </tr>
        <tr>
            <td>Ổ dữ liệu tổ 3</td>
            <td> ổ dữ liệu tổ 4</td>
        </tr>
    </table>
    <table style="width:100%">
        <caption><h1> Bảng danh sách sinh viên</h1></caption>
        <thead>
            <tr>
            <th colspan="2"> Gộp 2 cột bằng colspan</th>
            <th> age </th>
            <th rowspan="3"> Gộp 3 bằng hàng lại với nhau</th>
        </tr>
        </thead> 
        
    </table>
</body>
</html>
